<!DOCTYPE html>
<html>
<head>
    <title>삭제 확인</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 50px auto; }
        .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; }
        .btn-delete { background: #f44336; }
        .btn-back { background: #666; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <h1>정말 삭제하시겠습니까?</h1>
    <p>"{{ review.title }}"을(를) 삭제합니다.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">삭제</button>
        <a href="{% url 'review-detail' review.pk %}" class="btn btn-back">취소</a>
    </form>
</body>
</html>
